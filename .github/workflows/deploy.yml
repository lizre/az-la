name: Deploy to Azure App Service

on:
  push:
    branches:
      - main  # Deploy automatically on every push to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies & run a basic check
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Deploy to Azure App Service
      #    AZURE_WEBAPP_PUBLISH_PROFILE comes from:
      #    Azure Portal > App Service > Get publish profile > copy contents
      #    Then add it as a GitHub secret: Settings > Secrets > AZURE_WEBAPP_PUBLISH_PROFILE
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}       # e.g. "my-learning-app"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
